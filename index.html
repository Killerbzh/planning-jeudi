<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Planning des Jeudis : Édition Live Mensuelle</title>
    <style>
        :root {
            --bg-color: #f4f7f9;
            --sidebar-bg: #1e293b;
            --sidebar-text: #94a3b8;
            --sidebar-active: #38bdf8;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            --text-main: #0f172a;
            --text-muted: #64748b;
            
            --grad-1: linear-gradient(135deg, #0284c7, #0369a1);
            --grad-2: linear-gradient(135deg, #b45309, #78350f);
            --grad-3: linear-gradient(135deg, #047857, #065f46);
            --grad-4: linear-gradient(135deg, #be123c, #9f1239);
            --grad-5: linear-gradient(135deg, #6d28d9, #5b21b6);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0;
            display: flex; min-height: 100vh; flex-direction: row;
        }

        .sidebar {
            width: 280px; background-color: var(--sidebar-bg); padding: 40px 24px;
            display: flex; flex-direction: column; gap: 8px;
            box-shadow: 5px 0 25px rgba(0,0,0,0.05); flex-shrink: 0;
        }

        .logo-area {
            display: flex; align-items: center; gap: 12px;
            font-weight: 800; font-size: 1.3rem; color: white;
            margin-bottom: 40px; letter-spacing: -0.5px;
        }

        .nav-btn {
            display: flex; align-items: center; gap: 14px; padding: 14px 18px;
            border-radius: 12px; background: transparent; border: none;
            color: var(--sidebar-text); font-weight: 600; font-size: 0.95rem;
            cursor: pointer; text-align: left; transition: all 0.3s ease;
            width: 100%;
        }

        .nav-btn.active { background-color: rgba(56, 189, 248, 0.1); color: var(--sidebar-active); }
        .nav-btn:hover:not(.active) { background-color: rgba(255, 255, 255, 0.05); color: white; }

        .main-content { flex: 1; padding: 40px 50px; overflow-y: auto; max-width: 1400px; margin: 0 auto; width: 100%; }
        .header-status { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; gap: 15px; }
        
        h1 {
            margin: 0; font-size: 2rem; font-weight: 800; letter-spacing: -1px;
            background: linear-gradient(to right, #0f172a, #334155);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .month-selector-wrapper {
            display: flex; align-items: center; gap: 10px; background: white;
            padding: 6px 14px; border-radius: 14px; box-shadow: var(--card-shadow);
            border: 1px solid #e2e8f0;
        }

        .month-selector-wrapper label { font-weight: 700; font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; }

        .month-select {
            border: none; background: transparent; font-size: 1rem; font-weight: 800;
            color: #0284c7; cursor: pointer; outline: none; padding-right: 5px;
        }

        .page-section { display: none; }
        .page-section.active { display: block; }

        .section-panel { background: white; border-radius: 20px; padding: 25px; box-shadow: var(--card-shadow); margin-bottom: 35px; }
        .panel-title { margin-top: 0; margin-bottom: 20px; font-size: 1.15rem; font-weight: 700; }
        .inputs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
        
        .input-group { display: flex; align-items: center; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 10px 14px; }
        .input-group input { border: none; background: transparent; width: 100%; font-size: 0.95rem; color: var(--text-main); font-weight: 600; }
        .input-group input:focus { outline: none; }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        .semaine-card { border-radius: 24px; color: white; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .card-header { font-size: 1.15rem; font-weight: 800; display: flex; justify-content: space-between; }
        
        .role-box { display: flex; flex-direction: column; background: rgba(255, 255, 255, 0.08); padding: 12px 16px; border-radius: 14px; }
        .role-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; opacity: 0.7; margin-bottom: 4px; }
        .role-name { font-size: 1.05rem; font-weight: 700; }

        .rating-box { display: flex; flex-direction: column; gap: 6px; }
        .stars { display: flex; gap: 8px; font-size: 1.4rem; cursor: pointer; }
        .star { color: rgba(255, 255, 255, 0.25); }
        .star.active { color: #facc15; }

        .stats-container { background: white; border-radius: 24px; padding: 30px; box-shadow: var(--card-shadow); overflow-x: auto; }
        .stats-table { width: 100%; border-collapse: collapse; }
        .stats-table th { padding: 16px; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; border-bottom: 2px solid #f1f5f9; text-align: left; }
        .stats-table td { padding: 16px; border-bottom: 1px solid #f1f5f9; }

        .badge-rank { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; font-weight: 800; background: #f1f5f9; }
        .rank-1 { background: #fef08a; color: #854d0e; }
        .rank-2 { background: #e2e8f0; color: #475569; }
        .rank-3 { background: #ffedd5; color: #9a3412; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { position: fixed; bottom: 0; left: 0; right: 0; width: 100%; height: 70px; flex-direction: row; padding: 0 10px; justify-content: space-around; align-items: center; z-index: 1000; box-shadow: 0 -5px 25px rgba(0,0,0,0.15); gap: 0; }
            .logo-area { display: none; }
            .nav-btn { flex-direction: column; gap: 4px; padding: 8px; font-size: 0.75rem; text-align: center; flex: 1; justify-content: center; }
            .main-content { padding: 20px 16px 90px 16px; }
            h1 { font-size: 1.5rem; }
            .header-status { flex-direction: column; align-items: flex-start; gap: 12px; }
            .inputs-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
            .cards-grid { grid-template-columns: 1fr; }
        }

        .sem-1 { background: var(--grad-1); } .sem-2 { background: var(--grad-2); }
        .sem-3 { background: var(--grad-3); } .sem-4 { background: var(--grad-4); }
        .sem-5 { background: var(--grad-5); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="sidebar">
        <div class="logo-area">✨ <span>Jeudi Cuistot</span></div>
        <button class="nav-btn active" id="btn-aperçu" onclick="switchPage('aperçu')">📅 <span>Planning</span></button>
        <button class="nav-btn" id="btn-stats" onclick="switchPage('stats')">🏆 <span>Classement</span></button>
    </div>

    <div class="main-content">
        <div class="header-status">
            <h1>Workspace Culinary Hub</h1>
            
            <div style="display: flex; gap: 15px; align-items: center;">
                <div class="month-selector-wrapper">
                    <label for="monthSelect">Mois :</label>
                    <select id="monthSelect" class="month-select">
                        <option value="2026-06">Juin</option>
                        <option value="2026-07">Juillet</option>
                        <option value="2026-08">Août</option>
                        <option value="2026-09">Septembre</option>
                        <option value="2026-10">Octobre</option>
                        <option value="2026-11">Novembre</option>
                        <option value="2026-12">Décembre</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="page-aperçu" class="page-section active">
            <div class="section-panel">
                <div class="panel-title">👥 Équipe de cuisine (Modifs en direct sur ce mois)</div>
                <div class="inputs-grid" id="inputsContainer"></div>
            </div>
            <h2 id="planningTitle" style="font-weight:800; font-size:1.3rem; margin-bottom:20px; color:#1e293b;">📅 Les Jeudis du Mois</h2>
            <div class="cards-grid" id="cardsContainer"></div>
        </div>

        <div id="page-stats" class="page-section">
            <div class="stats-container">
                <h2 id="statsTitle" style="margin-top:0; font-weight:800; font-size:1.4rem; margin-bottom:6px;">🏆 Classement du Mois</h2>
                <p style="color:var(--text-muted); margin-bottom:25px; margin-top:0; font-size:0.9rem;">Calculé selon la satisfaction moyenne du plat principal sur le mois sélectionné.</p>
                <table class="stats-table">
                    <thead>
                        <tr><th style="width: 80px;">Rang</th><th>Nom</th><th>Score Moyen</th><th>Prestations</th></tr>
                    </thead>
                    <tbody id="statsTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Tes clés de configuration
    const firebaseConfig = {
        apiKey: "AIzaSyCsJACTFFdHAF1v0QNw9h5spegq7lV2-zE",
        authDomain: "planning-jeudi.firebaseapp.com",
        projectId: "planning-jeudi",
        storageBucket: "planning-jeudi.firebasestorage.app",
        messagingSenderId: "894632315552",
        appId: "1:894632315552:web:aed8853528dec823d617c5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Une rotation classique simplifiée pour 5 jeudis maximum par mois
    const baseRotation = [
        { plat: 1, dessert: 2, remp: 3 },
        { plat: 4, dessert: 5, remp: 6 },
        { plat: 7, dessert: 8, remp: 9 },
        { plat: 10, dessert: 1, remp: 2 },
        { plat: 3, dessert: 4, remp: 5 }
    ];
    const emojis = ["🦊", "🦁", "🐼", "🐨", "🐯", "🐱", "🐰", "🦊", "🦄", "🦅"];
    
    // Valeurs par défaut
    let defaultParticipants = ["Lucas", "Laura", "Claribel", "Yoann", "Mireille", "Jeanne", "Candices", "Killian", "Annaig", "Invité(e)"];
    
    let participants = [...defaultParticipants];
    let ratings = [0, 0, 0, 0, 0];
    let currentMonth = "2026-06"; // Juin par défaut
    let unsubscribe = null;

    const monthNames = {
        "2026-06": "Juin", "2026-07": "Juillet", "2026-08": "Août",
        "2026-09": "Septembre", "2026-10": "Octobre", "2026-11": "Novembre", "2026-12": "Décembre"
    };

    window.switchPage = function(pageId) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`page-${pageId}`).classList.add('active');
        document.getElementById(`btn-${pageId}`).classList.add('active');
        if(pageId === 'stats') generateStats();
    }

    // Écouter le changement de mois sur l'écran
    document.getElementById('monthSelect').addEventListener('change', (e) => {
        currentMonth = e.target.value;
        document.getElementById('planningTitle').innerText = `📅 Les Jeudis de ${monthNames[currentMonth]}`;
        document.getElementById('statsTitle').innerText = `🏆 Classement de ${monthNames[currentMonth]}`;
        connectToMonth(currentMonth);
    });

    // Fonction de connexion dynamique au mois sélectionné dans Firebase
    function connectToMonth(monthId) {
        if (unsubscribe) unsubscribe(); // On coupe l'ancienne écoute

        unsubscribe = onSnapshot(doc(db, "planning", `mois_${monthId}`), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                participants = data.names || [...defaultParticipants];
                ratings = data.ratings || [0, 0, 0, 0, 0];
            } else {
                // Si le mois n'existe pas encore dans Firebase, on le crée propre !
                participants = [...defaultParticipants];
                ratings = [0, 0, 0, 0, 0];
                setDoc(doc(db, "planning", `mois_${monthId}`), { names: participants, ratings: ratings });
            }
            initInputs();
            generatePlanningCards();
            if (document.getElementById('page-stats').classList.contains('active')) {
                generateStats();
            }
        });
    }

    function initInputs() {
        const container = document.getElementById('inputsContainer');
        container.innerHTML = '';
        participants.forEach((name, index) => {
            const div = document.createElement('div');
            div.className = 'input-group';
            div.innerHTML = `
                <span style="margin-right:8px;">${emojis[index % emojis.length]}</span>
                <input type="text" value="${name}" data-index="${index}" id="input-chef-${index}">
            `;
            container.appendChild(div);
            
            document.getElementById(`input-chef-${index}`).addEventListener('blur', (e) => {
                const idx = e.target.dataset.index;
                participants[idx] = e.target.value || `Collaborateur ${parseInt(idx) + 1}`;
                updateDoc(doc(db, "planning", `mois_${currentMonth}`), { names: participants });
            });
        });
    }

    window.rateWeekCloud = function(weekIndex, starRating) {
        ratings[weekIndex] = starRating;
        updateDoc(doc(db, "planning", `mois_${currentMonth}`), { ratings: ratings });
    }

    function generatePlanningCards() {
        const cardsContainer = document.getElementById('cardsContainer');
        cardsContainer.innerHTML = '';

        baseRotation.forEach((semaine, i) => {
            const card = document.createElement('div');
            card.className = `semaine-card sem-${i + 1}`;
            
            const platName = participants[semaine.plat - 1] || '';
            const dessertName = participants[semaine.dessert - 1] || '';
            const rempName = participants[semaine.remp - 1] || '';
            const currentRating = ratings[i];

            let starsHTML = '';
            for(let s = 1; s <= 5; s++) {
                starsHTML += `<span class="star ${s <= currentRating ? 'active' : ''}" onclick="rateWeekCloud(${i}, ${s})">★</span>`;
            }

            card.innerHTML = `
                <div class="card-header"><span>Jeudi Semaine ${i + 1}</span><span style="font-size:0.75rem; opacity:0.6;">${monthNames[currentMonth].toUpperCase()}</span></div>
                <div class="role-box"><span class="role-label">🍲 Plat Principal</span><span class="role-name">${platName}</span></div>
                <div class="role-box"><span class="role-label">🍰 Dessert</span><span class="role-name">${dessertName}</span></div>
                <div class="role-box"><span class="role-label">🔄 Remplaçant</span><span class="role-name">${rempName}</span></div>
                <div class="rating-box"><span class="role-label">Évaluer le repas</span><div class="stars">${starsHTML}</div></div>
            `;
            cardsContainer.appendChild(card);
        });
    }

    function generateStats() {
        const tbody = document.getElementById('statsTableBody');
        tbody.innerHTML = '';
        let playerStats = participants.map(name => ({ name, totalStars: 0, repasComptes: 0 }));

        baseRotation.forEach((semaine, i) => {
            const note = ratings[i];
            if (note > 0) {
                const chefIdx = semaine.plat - 1;
                if(playerStats[chefIdx]) {
                    playerStats[chefIdx].totalStars += note;
                    playerStats[chefIdx].repasComptes += 1;
                }
            }
        });

        playerStats.forEach(p => { p.moyenne = p.repasComptes > 0 ? (p.totalStars / p.repasComptes).toFixed(1) : "N/A"; });
        playerStats.sort((a, b) => {
            if (a.moyenne === "N/A") return 1; if (b.moyenne === "N/A") return -1;
            return parseFloat(b.moyenne) - parseFloat(a.moyenne);
        });

        playerStats.forEach((p, index) => {
            let rankClass = ""; let rankText = index + 1;
            if(p.moyenne !== "N/A") {
                if(index === 0) rankClass = "rank-1"; if(index === 1) rankClass = "rank-2"; if(index === 2) rankClass = "rank-3";
            }
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><span class="badge-rank ${rankClass}">${rankText}</span></td>
                <td style="font-weight:700;">${p.name}</td>
                <td style="color:${p.moyenne !== 'N/A' ? '#eab308' : '#94a3b8'}; font-weight:800;">${p.moyenne !== 'N/A' ? p.moyenne + ' ★' : 'Aucun repas noté'}</td>
                <td>${p.repasComptes} fois chef ce mois</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Premier lancement sur Juin
    connectToMonth(currentMonth);
</script>
</body>
</html>
