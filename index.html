<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Planning des Jeudis : Édition Premium Mobile</title>
    <style>
        :root {
            --bg-color: #f4f7f9;
            --sidebar-bg: #1e293b;
            --sidebar-text: #94a3b8;
            --sidebar-active: #38bdf8;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary-gradient: linear-gradient(135deg, #0ea5e9, #2563eb);
            
            /* Gradients haut de gamme pour les cartes */
            --grad-1: linear-gradient(135deg, #0f172a, #1e293b);
            --grad-2: linear-gradient(135deg, #0284c7, #0369a1);
            --grad-3: linear-gradient(135deg, #b45309, #78350f);
            --grad-4: linear-gradient(135deg, #047857, #065f46);
            --grad-5: linear-gradient(135deg, #be123c, #9f1239);
            --grad-6: linear-gradient(135deg, #6d28d9, #5b21b6);
            --grad-7: linear-gradient(135deg, #a21caf, #86198f);
            --grad-8: linear-gradient(135deg, #c2410c, #9a3412);
            --grad-9: linear-gradient(135deg, #1d4ed8, #1e40af);
            --grad-10: linear-gradient(135deg, #374151, #1f2937);
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
            flex-direction: row;
        }

        /* SIDEBAR MODERNE SOMBRE (PC) */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 5px 0 25px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 1.3rem;
            color: white;
            margin-bottom: 40px;
            letter-spacing: -0.5px;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            border-radius: 12px;
            background: transparent;
            border: none;
            color: var(--sidebar-text);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s ease;
        }

        .nav-btn.active {
            background-color: rgba(56, 189, 248, 0.1);
            color: var(--sidebar-active);
        }

        .nav-btn:hover:not(.active) {
            background-color: rgba(255, 255, 255, 0.05);
            color: white;
        }

        /* INTERFACE PRINCIPALE */
        .main-content {
            flex: 1;
            padding: 40px 50px;
            overflow-y: auto;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .header-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            gap: 15px;
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, #0f172a, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            background-color: #f0fdf4;
            color: #166534;
            padding: 10px 20px;
            border-radius: 99px;
            font-size: 0.85rem;
            font-weight: 700;
            border: 1px solid #dcfce7;
            box-shadow: 0 4px 12px rgba(22, 101, 52, 0.05);
            white-space: nowrap;
        }

        .page-section { display: none; }
        .page-section.active { display: block; }

        /* PANNEAU DE CONFIGURATION ÉPURÉ */
        .section-panel {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: var(--card-shadow);
            margin-bottom: 35px;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .panel-title {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.15rem;
            font-weight: 700;
            color: #1e293b;
        }

        .inputs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 14px;
        }

        .input-group {
            display: flex;
            align-items: center;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px 14px;
            transition: all 0.2s ease;
        }

        .input-group:focus-within {
            border-color: #38bdf8;
            background: white;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
        }

        .input-group input {
            border: none;
            background: transparent;
            width: 100%;
            font-size: 0.95rem;
            color: var(--text-main);
            font-weight: 600;
        }
        .input-group input:focus { outline: none; }

        /* GRILLE DE CARTES ULTRA DESIGN */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .semaine-card {
            border-radius: 24px;
            color: white;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .semaine-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 35px rgba(0,0,0,0.1);
        }

        .card-header {
            font-size: 1.15rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            opacity: 0.95;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .role-box {
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.07);
            padding: 12px 16px;
            border-radius: 14px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .role-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            opacity: 0.7;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .role-name {
            font-size: 1.05rem;
            font-weight: 700;
        }

        /* NOTATION ÉTOILES PREMIUM */
        .rating-box {
            margin-top: 4px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .stars {
            display: flex;
            gap: 8px;
            font-size: 1.4rem;
            cursor: pointer;
        }

        .star {
            color: rgba(255, 255, 255, 0.25);
            transition: all 0.2s ease;
        }
        .star:hover, .star.active {
            color: #facc15;
            transform: scale(1.15);
        }

        /* PAGE DES STATS STYLE TABLEAU DE BORD */
        .stats-container {
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: var(--card-shadow);
            overflow-x: auto;
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 500px;
        }

        .stats-table th {
            padding: 16px 20px;
            color: var(--text-muted);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            border-bottom: 2px solid #f1f5f9;
        }

        .stats-table td {
            padding: 18px 20px;
            font-size: 0.95rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .badge-rank {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-weight: 800;
            font-size: 0.9rem;
            background: #f1f5f9;
            color: #475569;
        }

        .rank-1 { background: #fef08a; color: #854d0e; }
        .rank-2 { background: #e2e8f0; color: #475569; }
        .rank-3 { background: #ffedd5; color: #9a3412; }

        /* REGLAGES RESPONSIVE MOBILE EXCLUSIFS */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            /* On cache la sidebar PC pour la mettre en bas */
            .sidebar {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                width: 100%;
                height: 70px;
                flex-direction: row;
                padding: 0 10px;
                justify-content: space-around;
                align-items: center;
                z-index: 1000;
                box-shadow: 0 -5px 25px rgba(0,0,0,0.15);
                gap: 0;
            }

            .logo-area {
                display: none; /* Cache le logo sur mobile pour gagner de la place */
            }

            .nav-btn {
                flex-direction: column;
                gap: 4px;
                padding: 8px;
                font-size: 0.75rem;
                border-radius: 8px;
                text-align: center;
                flex: 1;
                justify-content: center;
            }

            .nav-btn:nth-child(4) {
                display: none; /* Cache l'option d'impression papier inutile sur mobile */
            }

            .main-content {
                padding: 20px 16px 90px 16px; /* 90px en bas pour ne pas être masqué par la barre */
            }

            h1 {
                font-size: 1.6rem;
            }

            .header-status {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
                margin-bottom: 25px;
            }

            .inputs-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 10px;
            }

            .input-group {
                padding: 8px 10px;
            }

            .input-group input {
                font-size: 0.85rem;
            }

            .cards-grid {
                grid-template-columns: 1fr; /* Une seule carte par ligne sur mobile */
                gap: 16px;
            }

            .semaine-card {
                padding: 20px;
                border-radius: 20px;
            }

            .stats-container {
                padding: 15px;
                border-radius: 20px;
            }
        }

        /* Attribution des thèmes couleurs */
        .sem-1 { background: var(--grad-1); } .sem-2 { background: var(--grad-2); }
        .sem-3 { background: var(--grad-3); } .sem-4 { background: var(--grad-4); }
        .sem-5 { background: var(--grad-5); } .sem-6 { background: var(--grad-6); }
        .sem-7 { background: var(--grad-7); } .sem-8 { background: var(--grad-8); }
        .sem-9 { background: var(--grad-9); } .sem-10 { background: var(--grad-10); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="sidebar">
        <div class="logo-area">✨ <span>Jeudi Cuistot</span></div>
        <button class="nav-btn active" id="btn-aperçu" onclick="switchPage('aperçu')">📅 <span>Planning</span></button>
        <button class="nav-btn" id="btn-stats" onclick="switchPage('stats')">🏆 <span>Classement</span></button>
        <button class="nav-btn" onclick="window.print()">🖨️ <span>Imprimer</span></button>
    </div>

    <div class="main-content">
        
        <div class="header-status">
            <h1>Workspace Culinary Hub</h1>
            <div class="status-badge">⚡ Sauvegardé en Cloud Local</div>
        </div>

        <div id="page-aperçu" class="page-section active">
            <div class="section-panel">
                <div class="panel-title">👥 Équipe de cuisine (Modifiable en direct)</div>
                <div class="inputs-grid" id="inputsContainer"></div>
            </div>

            <h2 style="font-weight:800; font-size:1.3rem; margin-bottom:20px; color:#1e293b;">📅 Calendrier des Rotations</h2>
            <div class="cards-grid" id="cardsContainer"></div>
        </div>

        <div id="page-stats" class="page-section">
            <div class="stats-container">
                <h2 style="margin-top:0; font-weight:800; font-size:1.4rem; margin-bottom:6px;">🏆 Le Classement des Chefs</h2>
                <p style="color:var(--text-muted); margin-bottom:25px; margin-top:0; font-size:0.9rem;">Calculé selon la satisfaction moyenne du plat principal.</p>
                
                <table class="stats-table">
                    <thead>
                        <tr>
                            <th style="width: 80px;">Rang
